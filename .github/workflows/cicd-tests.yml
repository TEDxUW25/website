name: CI and Release for test branch

on:
  pull_request:
    branches: [test]
  push:
    branches: [test]

jobs:
  ci:
    name: Run Lint, Build, and Start
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '23.11.0'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Start/Custom
        run: npm run dev || echo "Run script completed"

  release:
    name: Tag Release on Merge
    needs: ci
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/test')
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "test-release-${{ github.run_number }}"
          name: "Test Release ${{ github.run_number }}"
          body: |
            🚀 [View the live site](https://tedxuw25.netlify.app)

            This release was automatically generated after pushing to the `test` branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
