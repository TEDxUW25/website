name: CI/CD testing

on:
  pull_request:
    branches: ['*']

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.11.1'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.11.1'
      - run: npm ci
      - run: npm run build

    release:
    name: Release on merge
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'push'
    steps:
      - name: Check out to branch
        uses: actions/checkout@v3

      - name: Skip if not a PR merge commit
        run: |
          MERGE_COUNT=$(git rev-list --parents -n 1 HEAD | wc -w)
          if [ "$MERGE_COUNT" -lt 3 ]; then
            echo "Not a merge commit. Skipping release."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "release-${{ github.run_number }}"
          name: "Release ${{ github.run_number }}"
          generate_release_notes: true
          body: |
            🚀 [View the Netlify Preview](https://${{ github.ref_name }}--tedxuw25.netlify.app)

            This release was automatically generated after pushing to the `${{ github.ref_name }}` branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
