name: CI/CD testing

on:
  pull_request:
    branches: [test]
  push:
    branches: [test]

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.11.1'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.11.1'
      - run: npm ci
      - run: npm run build

  release:
    name: Tag Release on Merge
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/test')
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "test-release-${{ github.run_number }}"
          name: "Test Release ${{ github.run_number }}"
          generate_release_notes: true
          body: |
            🚀 [View the live site](https://tedxuw25.netlify.app)

            This release was automatically generated after pushing to the `test` branch.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
